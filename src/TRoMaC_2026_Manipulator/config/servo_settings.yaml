use_gazebo: false # 告诉servo不在gazebo中运行。因为Gazebo有一套自己的典型话题/时钟假设，并非系统时间，
                  # 如果要用需自行订阅/clock话题

## Incoming command properties
command_in_type: "unitless" # 笛卡尔速度指令，单位并非m/s或rad/s，而是[-1:1]方向与相对强度。
scale:
  linear: 1.50 # 线速度
  rotational: 1.50 # 角速度
  joint: 1.50 # 关节速度(也就是JointJog的速度缩放)

## Outgoing command properties
publish_period: 0.01 # 发布关节轨迹周期，单位秒。
low_latency_mode: true # 一有有效指令就尽快更新输出。
command_out_type: trajectory_msgs/JointTrajectory # Servo 下游对接 JointTrajectory控制器。
publish_joint_positions: true # 发布的轨迹点需不需要带上关节角
publish_joint_velocities: true # 发布的轨迹点需不需要带上关节角速度
publish_joint_accelerations: false # 发布的轨迹点需不需要带上关节角加速度

## Smoothing  online_signal_smoothing::ButterworthFilterPlugin
# Ruckig 在线滤波 (online_signal_smoothing::RuckigFilterPlugin) 要 Iron/Jazzy 才有。
smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"
low_pass_filter_coeff: 2.0  # 适度消除输入抖动

## Planning scene ownership
is_primary_planning_scene_monitor: true # 是否是主规划场景监控器。
#规划场景包括机器人各连杆姿态、禁止碰的体素/物体、附加的夹爪物体、有时还有 octomap 等。碰撞检测、奇异/限位之外的安全逻辑很多都依赖这份场景。

## MoveIt group and frames
move_group_name: manipulator
planning_frame: base_link
ee_frame_name: 6Link
robot_link_command_frame: base_link  

## Stopping behavior
incoming_command_timeout: 1.00
num_outgoing_halt_msgs_to_publish: 4

## Singularity and joint limit handling
lower_singularity_threshold: 1000.0
hard_stop_singularity_threshold: 5000.0
leaving_singularity_threshold_multiplier: 2.0 
joint_limit_margin: 0.01 # 关节限位余量，单位rad

## 碰限位时只停碰限位的关节，不停全部关节
halt_all_joints_in_joint_mode: false
halt_all_joints_in_cartesian_mode: false

## Topics
cartesian_command_in_topic: ~/delta_twist_cmds
joint_command_in_topic: ~/delta_joint_cmds
joint_topic: /commanded_joint_states  # servo 用 commanded（非 actual）作为当前状态视图，
                                      # 避免下位机响应慢导致 cmd 在原地振荡（issue: 闭环 + 流式 servo）
status_topic: ~/status
command_out_topic: /manipulator_controller/joint_trajectory

## Collision checking
check_collisions: false
collision_check_rate: 10.0
self_collision_proximity_threshold: 0.005
scene_collision_proximity_threshold: 0.005
